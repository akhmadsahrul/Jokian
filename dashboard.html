<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

  <!-- TOPBAR MOBILE -->
  <div class="topbar d-md-none">
    <button onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h5>SITTA</h5>
  </div>
  <div id="overlay" onclick="closeSidebar()"></div>

  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <h4><i class="fas fa-cube"></i> SITTA</h4>

      <ul class="list-unstyled mt-3">
        <li class="active"><i class="fas fa-home"></i> Dashboard</li>

        <li>
          <a href="stok.html"><i class="fas fa-box"></i> Bahan Ajar</a>
        </li>

        <li>
          <a href="tracking.html"><i class="fas fa-truck"></i> Tracking</a>
        </li>

        <li class="dropdown">
          <span>
            <i class="fas fa-chart-bar"></i> Laporan
            <i class="fas fa-chevron-down"></i>
          </span>

          <ul class="submenu">
            <li><a href="#">Monitoring DO</a></li>
            <li><a href="#">Rekap Bahan Ajar</a></li>
          </ul>
        </li>

        <li><i class="fas fa-history"></i> Histori</li>
      </ul>
    </div>

    <!-- Main -->
    <div class="main">

      <!-- Header -->
      <div class="header">
        <div>
          <h3><i class="fas fa-home"></i> Dashboard</h3>
          <p id="greeting"></p>
        </div>

        <button class="btn btn-danger btn-sm" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>

      <!-- Cards -->
      <div class="row g-3 cards">
        <div class="col-md-4 col-12">
          <div class="card text-center">
            <i class="fas fa-book text-primary"></i>
            <h5>Stok Bahan Ajar</h5>
            <h3 id="totalBahan"></h3>
          </div>
        </div>

        <div class="col-md-4 col-12">
          <div class="card text-center">
            <i class="fas fa-truck text-success"></i>
            <h5>Pengiriman</h5>
            <h3 id="totalTracking"></h3>
          </div>
        </div>

        <div class="col-md-4 col-12">
          <div class="card text-center">
            <i class="fas fa-users"></i>
            <h5>Total Pengguna</h5>
            <h3 id="totalUser"></h3>
          </div>
        </div>
      </div>

    </div>
  </div>


  <script src="js/data.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
