<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/stok.css">

</head>

<body>

    <!-- TOPBAR MOBILE -->
    <div class="topbar d-md-none">
        <button onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h5>SITTA</h5>
    </div>
    <div id="overlay" onclick="closeSidebar()"></div>

    <div class="layout">

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <h4><i class="fas fa-cube"></i> SITTA</h4>

            <ul class="list-unstyled mt-3">
                <li>
                    <a href="dashboard.html"> <i class="fas fa-home"></i> Dashboard</a>

                </li>

                <li class="active">
                    <a href="stok.html"><i class="fas fa-box"></i> Bahan Ajar</a>
                </li>

                <li>
                    <a href="tracking.html"><i class="fas fa-truck"></i> Tracking</a>
                </li>

                 <li class="dropdown">
          <span>
            <i class="fas fa-chart-bar"></i> Laporan
            <i class="fas fa-chevron-down"></i>
          </span>

          <ul class="submenu">
            <li><a href="#">Monitoring DO</a></li>
            <li><a href="#">Rekap Bahan Ajar</a></li>
          </ul>
        </li>

                <li><i class="fas fa-history"></i> Histori</li>
            </ul>
        </div>

        <!-- Main -->
        <div class="main">

            <!-- Header -->
            <div class="header">
                <div>
                    <h3><i class="fas fa-box"></i> Informasi Bahan Ajar</h3>
                    <p id="greeting"></p>
                </div>

                <button class="btn btn-danger btn-sm" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>

            <div class="container mt-3">

                <!-- TOP ACTION -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <p class="text-muted mb-0">Peragaan Data Bahan Ajar</p>

                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalTambah">
                        <i class="fas fa-plus"></i> Tambah Data
                    </button>
                </div>

                <!-- LIST -->
                <div id="listBahanAjar" class="row g-3"></div>

            </div>

        </div>

        <!-- MODAL -->
        <div class="modal fade" id="modalTambah">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5>Tambah Data</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <input class="form-control mb-2" id="kodeLokasi" placeholder="Kode Lokasi">
                        <input class="form-control mb-2" id="kodeBarang" placeholder="Kode Barang">
                        <input class="form-control mb-2" id="namaBarang" placeholder="Nama Barang">
                        <input class="form-control mb-2" id="jenisBarang" placeholder="Jenis Barang">
                        <input class="form-control mb-2" id="edisi" placeholder="Edisi">
                        <input class="form-control mb-2" id="stok" placeholder="Stok">

                        <!-- Upload -->
                        <input type="file" class="form-control mb-2" id="cover">

                        <!-- Preview -->
                        <img id="preview" class="img-fluid mt-2" style="display:none; border-radius:10px;">

                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button class="btn btn-success" onclick="tambahData()">Simpan</button>
                    </div>

                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>

    <script src="js/data.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/stok.js"></script>

</body>

</html>
