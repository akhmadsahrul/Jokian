<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/tracking.css">
</head>

<body>

  <!-- TOPBAR MOBILE -->
  <div class="topbar d-md-none">
    <button onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h5>SITTA</h5>
  </div>
  <div id="overlay" onclick="closeSidebar()"></div>

  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <h4><i class="fas fa-cube"></i> SITTA</h4>

      <ul class="list-unstyled mt-3">
        <li>
          <a href=""><i class="fas fa-home"></i> Dashboard</a>

        </li>

        <li>
          <a href="stok.html"><i class="fas fa-box"></i> Bahan Ajar</a>
        </li>

        <li class="active">
          <a href="tracking.html"><i class="fas fa-truck"></i> Tracking</a>
        </li>

        <li class="dropdown">
          <span>
            <i class="fas fa-chart-bar"></i> Laporan
            <i class="fas fa-chevron-down"></i>
          </span>

          <ul class="submenu">
            <li><a href="#">Monitoring DO</a></li>
            <li><a href="#">Rekap Bahan Ajar</a></li>
          </ul>
        </li>

        <li><i class="fas fa-history"></i> Histori</li>
      </ul>
    </div>

    <!-- Main -->
    <div class="main">

      <!-- Header -->
      <div class="header">
        <div>
          <h3><i class="fas fa-home"></i> Tracking</h3>
          <p id="greeting"></p>
        </div>

        <button class="btn btn-danger btn-sm" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>

      <!-- Cards -->
      <div class="card p-3">
        <h5>Tracking Pengiriman</h5>

        <div class="row g-2 mt-2">
          <div class="col-md-6 col-12">
            <input type="text" id="noDO" class="form-control" placeholder="Nomor Delivery Order">
          </div>
          <div class="col-md-2 col-12">
            <button class="btn btn-primary w-100" onclick="cariDO()">Cari</button>
          </div>
        </div>

        <div id="hasilTracking" class="mt-3"></div>
      </div>

    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/tracking.js"></script>

</body>

</html>
